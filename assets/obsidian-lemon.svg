<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="obsidian1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a4e59" />
      <stop offset="100%" stop-color="#111216" />
    </linearGradient>
    <linearGradient id="obsidian2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#606676" />
      <stop offset="100%" stop-color="#1a1c20" />
    </linearGradient>
    <linearGradient id="obsidian3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3b3e46" />
      <stop offset="100%" stop-color="#090a0c" />
    </linearGradient>
    <linearGradient id="obsidian4" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2d34" />
      <stop offset="100%" stop-color="#181a1e" />
    </linearGradient>
    <linearGradient id="obsidian5" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#111216" />
      <stop offset="100%" stop-color="#2a2d34" />
    </linearGradient>
    <linearGradient id="obsidian6" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#090a0c" />
      <stop offset="100%" stop-color="#4a4e59" />
    </linearGradient>
  </defs>
  
  <g stroke="#1a1c20" stroke-width="0.5" stroke-linejoin="round">
    <!-- Top left -->
    <polygon points="15,50 35,25 50,50" fill="url(#obsidian1)" />
    <!-- Top middle -->
    <polygon points="35,25 65,25 50,50" fill="url(#obsidian2)" />
    <!-- Top right -->
    <polygon points="65,25 85,50 50,50" fill="url(#obsidian3)" />
    <!-- Bottom left -->
    <polygon points="15,50 50,50 35,75" fill="url(#obsidian4)" />
    <!-- Bottom middle -->
    <polygon points="50,50 65,75 35,75" fill="url(#obsidian5)" />
    <!-- Bottom right -->
    <polygon points="50,50 85,50 65,75" fill="url(#obsidian6)" />
    
    <!-- Little leaf on top for extra lemon context -->
    <polygon points="60,25 75,10 65,25" fill="url(#obsidian1)" />
    <polygon points="60,25 75,10 70,30" fill="url(#obsidian4)" />
  </g>
</svg>
